  denied: "<prefix><yellow>Haraç isteği reddedildi."
  expired: "<prefix><yellow>Haraç isteğinin süresi doldu."

admin:
  usage: |
    <prefix><gold>/townyadmin raids reload
    <prefix><gold>/townyadmin raids start <attacker> <defender>
    <prefix><gold>/townyadmin raids end <town>
    <prefix><gold>/townyadmin raids phase <town> <pending|battle>
  forced-declare: "<prefix><green><white><attacker></white> ve <white><defender></white> arasında baskın zorla ilan edildi."
  forced-end: "<prefix><green><white><town></white> içeren baskın zorla sonlandırıldı."
  forced-phase: "<prefix><green>Baskın <white><phase></white> aşamasına zorla geçirildi."
  no-raid-for-town: "<prefix><red><white><town></white> içeren aktif bir baskın yok."
  invalid-phase: "<prefix><red>Bilinmeyen aşama. Geçerli aşamalar: <white>pending, battle</white>."
