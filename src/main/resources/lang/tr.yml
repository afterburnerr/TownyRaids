  only-attacker-request: "<prefix><red>Haraç yalnızca saldıran kasaba tarafından istenebilir."
  only-defender-answer: "<prefix><red>Haraç isteğine yalnızca savunan kasaba cevap verebilir."
  no-active-raid: "<prefix><red>Kasabanla bağlantılı aktif bir baskın yok."
  raid-not-pending: "<prefix><red>Haraç yalnızca hazırlık aşamasında istenebilir."
  amount-too-low: "<prefix><red>Haraç en az <white><amount></white> olmalı."
  amount-too-high: "<prefix><red>Haraç <white><amount></white> değerini aşamaz."
